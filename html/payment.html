<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secure Payment | SubscriptionPro</title>

<link rel="stylesheet" href="payment.css">

</head>

<body>

<header>

<div class="logo">
💎 SubscriptionPro
</div>

<nav>

<a href="index.html">Home</a>

<a href="dashboard.html">Dashboard</a>

<a href="subscription.html">subscription</a>

<a href="plans.html">Plans</a>

<a href="logout.html">logout</a>

</nav>

</header>

<div class="container">

<div class="summary">

<h1>Premium Plan</h1>

<p>Unlimited Features</p>

<div class="price">
₹999<span>/Month</span>
</div>

<hr>

<div class="bill">

<p>Subscription</p>

<span>₹999</span>

</div>

<div class="bill">

<p>GST (18%)</p>

<span>₹180</span>

</div>

<div class="bill total">

<p>Total</p>

<span>₹1179</span>

</div>

<hr>

<input
type="text"
placeholder="Coupon Code"
id="coupon">

<button id="applyCoupon">

Apply Coupon

</button>

</div>


<div class="payment">

<h2>Select Payment Method</h2>

<div class="payment-method">

<label>

<input
type="radio"
name="method"
value="card"
checked>

💳 Card

</label>

<label>

<input
type="radio"
name="method"
value="upi">

📱 UPI

</label>

<label>

<input
type="radio"
name="method"
value="bank">

🏦 Net Banking

</label>

</div>

<form id="paymentForm">


<div id="cardSection">

<input
type="text"
placeholder="Card Holder Name"
id="holder">

<input
type="text"
placeholder="Card Number"
maxlength="16"
id="cardNumber">

<div class="row">

<input
type="text"
placeholder="MM/YY"
id="expiry">

<input
type="password"
placeholder="CVV"
maxlength="3"
id="cvv">

</div>

</div>



<div id="upiSection" style="display:none;">

<input
type="text"
placeholder="Enter UPI ID (example@ybl)"
id="upi">

<button
type="button"
class="verify-btn">

Verify UPI

</button>

</div>


<div id="bankSection" style="display:none;">

<select id="bank">

<option>Select Bank</option>

<option>State Bank of India</option>

<option>HDFC Bank</option>

<option>ICICI Bank</option>

<option>Axis Bank</option>

<option>Indian Bank</option>

<option>Canara Bank</option>

</select>

<input
type="text"
placeholder="Account Holder Name"
id="accHolder">

<input
type="text"
placeholder="Account Number"
id="accNumber">

<input
type="text"
placeholder="IFSC Code"
id="ifsc">

</div>

<button
type="submit"
class="pay-btn">

Pay Securely

</button>

</form>

<div class="security">

🔒 SSL Secured Payment

<br>

256-bit Encryption

</div>

</div>

</div>

<script src="javascript.js"></script>

</body>
</html>
