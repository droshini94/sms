<section class="profile-container">

<h2>D Roshini</h2>

<p>Premium Member</p>

<label for="upload" class="upload-btn">

📷 Change Photo

</label>

<input
type="file"
id="upload"
accept="image/*"
hidden>

<div class="profile-stats">

<div>

<h3>8</h3>

<span>Months</span>

</div>

<div>

<h3>15</h3>

<span>Invoices</span>

</div>

<div>

<div class="details-card">

<h1>Account Details</h1>

<form id="profileForm">

<div class="row">

<div class="input-box">

<label>Full Name</label>

<input
type="text"
value="D Roshini">

</div>

<div class="input-box">

<label>Email</label>

<input
type="email"
value="droshini94@gmail.com">

</div>

</div>

<div class="row">

<div class="input-box">

<label>Mobile Number</label>

<input
type="text"
value="+91 9876543210">

</div>

<div class="input-box">

<label>Date of Birth</label>

<input
type="date">

</div>

</div>

<div class="row">

<div class="input-box">

<label>Current Plan</label>

<input
type="text"
value="Premium"
readonly>

</div>

<div class="input-box">

<label>Member Since</label>

<input
type="text"
value="January 2026"
readonly>

</div>

</div>

<div class="input-box">

<label>Address</label>

<textarea
rows="4"
placeholder="Enter Address"></textarea>

</div>

<h2>Notification Settings</h2>

<div class="switches">

<label>

<input
type="checkbox"
checked>

Renewal Reminder

</label>

<label>

<input
type="checkbox"
checked>

Payment Notifications

</label>

<label>

<input
type="checkbox">

Marketing Emails

</label>

</div>

<h2>Security</h2>

<div class="row">

<div class="input-box">

<label>New Password</label>

<input
type="password"
placeholder="Enter New Password">

</div>

<div class="input-box">

<label>Confirm Password</label>

<input
type="password"
placeholder="Confirm Password">

</div>

</div>

<div class="buttons">

<button
type="submit"
class="save-btn">

💾 Save Changes

</button>

<button
type="button"
class="delete-btn">

🗑 Delete Account

</button>

</div>
